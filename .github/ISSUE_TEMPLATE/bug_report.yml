name: 🐛 Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please run `opengriffin doctor` first and include its output below.

  - type: input
    id: version
    attributes:
      label: OpenGriffin version
      description: "Run `pip show opengriffin | grep Version` or commit hash if installed from source"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.5 / Ubuntu 22.04 / etc."
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Active provider
      options:
        - claude
        - anthropic
        - openai
        - gemini
        - deepseek
        - openrouter
        - azure
        - xai
        - mistral
        - cohere
        - bedrock
        - groq
        - cerebras
        - together
        - fireworks
        - perplexity
        - nvidia
        - huggingface
        - lambda
        - novita
        - ollama
        - custom
    validations:
      required: true

  - type: dropdown
    id: gateway
    attributes:
      label: Active gateway
      options:
        - telegram
        - discord
        - slack
        - email
        - imessage
        - signal
        - matrix
        - cli only
        - multiple
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior. What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal sequence that produces the bug. The fewer steps, the faster the fix.
      placeholder: |
        1. opengriffin run
        2. Send "..." in Telegram
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Output of `opengriffin doctor`
      render: shell
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Last ~50 lines of `bot.err.log` or wherever you redirect stderr. Redact tokens / personal info.
      render: shell
    validations:
      required: false
